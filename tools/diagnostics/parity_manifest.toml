lasym = false
axisymmetric = true
nfp = 1
ntor = 0
single_ns = 13
max_iter = 10
vmec_nstep = 1
rtol = 1e-3
atol = 1e-10
dump_level = "lite"
vmec_timeout = 90
goal = "Fixed-boundary large axisymmetric tokamak parity (ITERModel, mpol=12)."


version = 1
name = "vmec_jax parity matrix"
vmec2000_default = "../STELLOPT/VMEC2000/Release/xvmec2000"
notes = "Manifest for fixed/free boundary parity and performance sweeps across axisymmetric, non-axisymmetric, and LASYM branches."

[[cases]]
id = "fixed_axisym_lasym_false_circular"
tier = "smoke"
enabled = true
compare = "stage_trace"
source = "vmec_jax/examples"
input = "examples/data/input.circular_tokamak"
lfreeb = false
lasym = false
axisymmetric = true
nfp = 1
ntor = 0
single_ns = 13
max_iter = 10
vmec_nstep = 1
rtol = 1e-3
atol = 1e-10
dump_level = "lite"
vmec_timeout = 60
goal = "Fixed-boundary axisymmetric baseline parity and performance sanity."


lasym = false
axisymmetric = false
nfp = 5
ntor = 4
max_iter = 60
iter_list = [53, 54, 60]
vmec_timeout = 300
max_runtime_s = 30.0
max_total_runtime_s = 80.0
goal = "Instrumented-VMEC free-boundary target after vacuum turn-on: source_sym -> bvecNS -> potvac."

[cases.metric_thresholds_rel_scaled]
source_sym = 2.0e-2
bvec_nonsing_fouri = 2.0e-2
amatrix = 1.5e-1
potvac = 9.0e-1

[cases.metric_thresholds_rel_scaled_by_iter."53"]
source_sym = 2.0e-2
bvec_nonsing_fouri = 2.0e-2
amatrix = 1.5e-1
potvac = 3.0e-1

[cases.metric_thresholds_rel_scaled_by_iter."54"]
amatrix = 1.5e-1
potvac = 3.0e-1

[cases.metric_thresholds_rel_scaled_by_iter."60"]
amatrix = 1.5e-1
potvac = 9.0e-1

[cases.runtime_thresholds_s_by_iter."53"]
max_runtime_s = 25.0

[cases.runtime_thresholds_s_by_iter."54"]
max_runtime_s = 25.0

[cases.runtime_thresholds_s_by_iter."60"]

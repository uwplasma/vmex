name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  LC_ALL: C.UTF-8
  LANG: C.UTF-8

permissions:
  contents: read

# Interim CI during the vmec_jax overhaul (see plan.md).  The full coverage
# gate (>=95%) returns in Phase 8 together with the restructured test suite.
jobs:
  test:
    name: Fast Tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install .
          python -m pip install pytest pytest-xdist

      - name: Repository size check
        run: |
          size_kb=$(du -sk --exclude=.git . | cut -f1)
          echo "working tree: ${size_kb} KiB"
          test "$size_kb" -lt 40960 || { echo "working tree exceeds 40 MiB"; exit 1; }

      - name: Run fast tests
        env:
          JAX_ENABLE_X64: "1"
        run: |
          pytest -q -n 2 -m "not full" \
            tests/core_new/test_packaging_metadata.py \
            tests/core_new/test_fetch_assets.py \
            tests/core_new/test_input_profiles.py \
            tests/core_new/test_fourier_transforms.py \
            tests/core_new/test_preconditioner.py \
            tests/core_new/test_setup.py \
            tests/core_new/test_mgrid.py \
            tests/core_new/test_coils.py \
            --durations=25

  core-new:
    name: Core + golden parity suite
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install .
          python -m pip install pytest pytest-cov

      - name: Cache golden fixtures
        uses: actions/cache@v4
        with:
          path: ~/.cache/vmec_jax
          key: golden-v1

      - name: Run new-core suite with coverage (golden fixtures auto-fetched)
        env:
          JAX_ENABLE_X64: "1"
        run: |
          pytest -q tests/core_new --durations=15 \
            --cov=vmec_jax/core --cov-report=term

  cli-smoke:
    name: Console Script Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install .

      - name: Console script smoke test
        env:
          JAX_ENABLE_X64: "1"
        run: |
          vmec --help
          vmec --version
          rm -rf /tmp/vmec_jax_cli_smoke
          mkdir -p /tmp/vmec_jax_cli_smoke
          cd /tmp
          vmec "$GITHUB_WORKSPACE/examples/data/input.solovev" \
            --quiet \
            --outdir /tmp/vmec_jax_cli_smoke
          test -f /tmp/vmec_jax_cli_smoke/wout_solovev.nc

  build:
    name: Build (wheel/sdist + docs)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build + docs deps
        run: |
          python -m pip install -U pip
          python -m pip install .
          python -m pip install build sphinx furo

      - name: Build wheel and sdist
        run: |
          python -m build

      - name: Build docs (warnings as errors)
        run: |
          python -m sphinx -W -j auto -b html docs docs/_build/html

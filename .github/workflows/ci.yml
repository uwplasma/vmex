name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 8 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  LC_ALL: C.UTF-8
  LANG: C.UTF-8
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  id-token: write

jobs:
  parity-smoke:
    name: Parity Manifest Smoke (dry-run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Manifest smoke sweep (dry-run)
        run: |
          python tools/diagnostics/parity_sweep_manifest.py --tier smoke --max-cases 4 --dry-run --vmec-exec /usr/bin/true

  test:
    name: Fast Tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install .
          python -m pip install pytest pytest-cov

      - name: Console script smoke test
        env:
          JAX_ENABLE_X64: "1"
        run: |
          vmec_jax --help
          rm -rf /tmp/vmec_jax_cli_smoke
          mkdir -p /tmp/vmec_jax_cli_smoke
          cd /tmp
          vmec_jax "$GITHUB_WORKSPACE/examples/data/input.circular_tokamak" \
            --max-iter 2 \
            --no-multigrid \
            --no-use-input-niter \
            --quiet \
            --outdir /tmp/vmec_jax_cli_smoke
          test -f /tmp/vmec_jax_cli_smoke/wout_circular_tokamak.nc

      - name: Compile (Python)
        run: |
          python -m compileall -q vmec_jax

      - name: Repository size audit
        run: |
          python tools/diagnostics/repo_size_audit.py --top 20 --max-total-mib 60 --max-file-mib 5

      - name: Run tests
        env:
          JAX_ENABLE_X64: "1"
        run: |
          if [ "${{ matrix.python-version }}" = "3.11" ]; then
            pytest -q -m "not full and not vmec2000" --cov=vmec_jax --cov-report=xml --cov-report=term-missing:skip-covered --cov-fail-under=58
          else
            pytest -q -m "not full and not vmec2000"
          fi

      - name: Upload coverage artifact
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: coverage-py311
          path: coverage.xml

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v6.0.0
        with:
          use_oidc: true
          files: coverage.xml
          flags: py311
          name: py311-full
          fail_ci_if_error: false
          verbose: true

  physics-smoke:
    name: Physics Smoke (py3.11)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install .
          python -m pip install pytest

      - name: Fetch large assets
        run: |
          python tools/fetch_assets.py

      - name: Run bounded physics smoke
        env:
          JAX_ENABLE_X64: "1"
          RUN_FULL: "1"
        run: |
          pytest -q \
            'tests/test_wout_comprehensive_parity.py::test_wout_comprehensive_parity[circular_tokamak]' \
            'tests/test_wout_comprehensive_parity.py::test_wout_comprehensive_parity[nfp4_QH_warm_start]' \
            'tests/test_wout_comprehensive_parity.py::test_convergence_only[cth_like_free_bdy]' \
            'tests/test_wout_comprehensive_parity.py::test_convergence_only[nfp2_QA_highres]' \
            tests/test_driver_api.py::test_run_free_boundary_smoke_on_bundled_small_case \
            tests/test_qs_ess_render_smoke.py

  physics-full:
    name: Physics Full (manual/nightly)
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install .
          python -m pip install pytest pytest-cov

      - name: Fetch large assets
        run: |
          python tools/fetch_assets.py

      - name: Run full physics suite
        env:
          JAX_ENABLE_X64: "1"
          RUN_FULL: "1"
        run: |
          pytest -q -m "full and not vmec2000"

  build:
    name: Build (wheel/sdist + docs)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build + docs deps
        run: |
          python -m pip install -U pip
          python -m pip install .
          python -m pip install build sphinx furo

      - name: Build wheel and sdist
        run: |
          python -m build

      - name: Build docs (warnings as errors)
        env:
          LC_ALL: C.UTF-8
          LANG: C.UTF-8
          SPHINX_FAST: "1"
        run: |
          python -m sphinx -W -j auto -b html docs docs/_build/html

  docs-full:
    name: Docs (full guide)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install docs deps
        run: |
          python -m pip install -U pip
          python -m pip install ".[docs]"

      - name: Build full docs
        env:
          LC_ALL: C.UTF-8
          LANG: C.UTF-8
          READTHEDOCS: "True"
        run: |
          python -m sphinx -W -j auto -b html docs docs/_build/html_full

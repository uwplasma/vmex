name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  LC_ALL: C.UTF-8
  LANG: C.UTF-8

permissions:
  contents: read
  id-token: write

jobs:
  parity-smoke:
    name: Parity Manifest Smoke (dry-run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Manifest smoke sweep (dry-run)
        run: |
          python tools/diagnostics/parity_sweep_manifest.py --tier smoke --max-cases 4 --dry-run --vmec-exec /usr/bin/true

  test:
    name: Tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install .
          python -m pip install pytest pytest-cov

      - name: Console script smoke test
        env:
          JAX_ENABLE_X64: "1"
        run: |
          vmec_jax --help
          rm -rf /tmp/vmec_jax_cli_smoke
          mkdir -p /tmp/vmec_jax_cli_smoke
          cd /tmp
          vmec_jax "$GITHUB_WORKSPACE/examples/data/input.circular_tokamak" \
            --max-iter 2 \
            --no-multigrid \
            --no-use-input-niter \
            --quiet \
            --outdir /tmp/vmec_jax_cli_smoke
          test -f /tmp/vmec_jax_cli_smoke/wout_circular_tokamak.nc

      - name: Fetch large assets
        run: |
          python tools/fetch_assets.py

      - name: Compile (Python)
        run: |
          python -m compileall -q vmec_jax

      - name: Run tests
        env:
          JAX_ENABLE_X64: "1"
          RUN_FULL: "1"
        run: |
          if [ "${{ matrix.python-version }}" = "3.11" ]; then
            pytest -q --cov=vmec_jax --cov-report=xml --cov-report=term-missing:skip-covered
          else
            pytest -q
          fi

      - name: Upload coverage artifact
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py311
          path: coverage.xml

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          files: coverage.xml
          flags: py311
          name: py311-full
          fail_ci_if_error: false
          verbose: true

  build:
    name: Build (wheel/sdist + docs)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build + docs deps
        run: |
          python -m pip install -U pip
          python -m pip install .
          python -m pip install build sphinx furo

      - name: Fetch large assets
        run: |
          python tools/fetch_assets.py

      - name: Build wheel and sdist
        run: |
          python -m build

      - name: Build docs (warnings as errors)
        env:
          LC_ALL: C.UTF-8
          LANG: C.UTF-8
          SPHINX_FAST: "1"
        run: |
          python -m sphinx -W -j auto -b html docs docs/_build/html

  docs-full:
    name: Docs (full guide)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install docs deps
        run: |
          python -m pip install -U pip
          python -m pip install ".[docs]"

      - name: Build full docs
        env:
          LC_ALL: C.UTF-8
          LANG: C.UTF-8
        run: |
          python -m sphinx -j auto -b html docs docs/_build/html_full

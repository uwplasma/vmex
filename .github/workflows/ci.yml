name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    # nightly full-physics run (RUN_FULL=1 tests)
    - cron: "17 4 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  LC_ALL: C.UTF-8
  LANG: C.UTF-8

permissions:
  contents: read

# Sharded CI (plan.md Phase-2 review item 1): five parallel test jobs, each
# well under the 10-minute wall-time budget, plus a fast lint gate (ruff +
# mypy) and a coverage gate that combines the parity + gradient shards and
# enforces >= 95% on vmex.
jobs:
  lint:
    # Fast fail-first gate (plan Item I.3): ruff + mypy over the whole tree,
    # separate from the test matrix so a lint regression fails in ~1 min
    # without blocking (or being masked by) the solver shards.  mypy runs on
    # py3.12 with the full [dev] install so its view of the numpy/jax stubs
    # matches a local `mypy vmex` (pyproject [tool.mypy] is the config).
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest
    timeout-minutes: 9
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install ".[dev]"

      - name: ruff
        run: ruff check vmex tests examples benchmarks tools

      - name: mypy
        run: mypy vmex

  fast:
    name: Fast unit tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 9
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install .
          python -m pip install pytest pytest-xdist

      - name: Repository size check
        run: |
          size_kb=$(du -sk --exclude=.git . | cut -f1)
          echo "working tree: ${size_kb} KiB"
          test "$size_kb" -lt 40960 || { echo "working tree exceeds 40 MiB"; exit 1; }

      - name: Run fast unit tests (no golden fixtures)
        env:
          JAX_ENABLE_X64: "1"
        run: |
          pytest -q -n 4 -m "not full" \
            tests/test_packaging_metadata.py \
            tests/test_fetch_assets.py \
            tests/test_input_profiles.py \
            tests/test_profiles.py \
            tests/test_step_control.py \
            tests/test_printing.py \
            tests/test_fourier_transforms.py \
            tests/test_preconditioner.py \
            tests/test_setup.py \
            tests/test_mgrid.py \
            --durations=25

  mirror:
    name: Mirror ${{ matrix.shard }} tests
    runs-on: ubuntu-latest
    timeout-minutes: 9
    strategy:
      fail-fast: false
      matrix:
        shard: [field, equilibrium, spline]
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install .
          python -m pip install pytest pytest-xdist
      - name: Run mirror tests
        env:
          JAX_ENABLE_X64: "1"
        run: |
          if [ "${{ matrix.shard }}" = "field" ]; then
            FILES="tests/mirror/test_exterior.py \
                   tests/mirror/test_free_boundary.py \
                   tests/mirror/test_geometry_fields.py"
          elif [ "${{ matrix.shard }}" = "equilibrium" ]; then
            FILES="tests/mirror/test_implicit.py \
                   tests/mirror/test_isotropic_forces.py \
                   tests/mirror/test_model_basis.py"
          else
            FILES="tests/mirror/test_analytic.py \
                   tests/mirror/test_splines.py \
                   tests/mirror/test_output.py"
          fi
          pytest -q -n 2 -m "not full" $FILES --durations=20

  parity:
    name: Parity suite ${{ matrix.shard }} (goldens, coverage)
    runs-on: ubuntu-latest
    # Headroom for slow shared runners: the golden solves run ~15-20 min on a
    # healthy runner but tip over a tighter limit on a slow one (the suite
    # content is unchanged). 35 absorbs that variance without masking a hang.
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        shard: [a, b, c, d]
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install .
          python -m pip install pytest pytest-xdist pytest-cov

      - name: Cache golden fixtures
        uses: actions/cache@v4
        with:
          path: ~/.cache/vmex
          key: golden-v1

      - name: Prefetch golden fixtures (once, before xdist workers fork)
        run: |
          python - <<'EOF'
          import importlib.util
          spec = importlib.util.spec_from_file_location(
              "tests_conftest", "tests/conftest.py")
          mod = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(mod)
          print("golden dir:", mod.resolve_golden_dir())
          EOF

      # Four shards, each well under the 10-min budget.  The xdist dist MODE is
      # chosen PER SHARD by whether its modules share an expensive fixture:
      #   * loadscope groups a whole module onto ONE worker, so module-scoped
      #     equilibrium fixtures (omnigenity qi_eq/tok_eq, bootstrap eq,
      #     stability vacuum/highbeta/shaped) are solved ONCE, not once-per-
      #     worker (measured: omnigenity 29 s -> 14 s).  But it SERIALISES a
      #     module's independent heavy tests onto that single worker.
      #   * load spreads individual tests across all 4 workers -- right for a
      #     module with many independent heavy tests and NO shared fixture (or
      #     a cheap /tmp-cached one), which otherwise bottlenecks its shard.
      # The two independent-heavy modules therefore run under `load`:
      #   b = golden_digests  (2 full VMEC2000-parity solves; no fixture;
      #                         loadscope serialised these to 484 s on 1 worker)
      #   d = optimize        (many least-squares runs; solovev_eq fixture is
      #                         cheap + /tmp-cached, so per-worker re-solve is
      #                         negligible; loadscope serialised 383 s)
      # The fixture-sharing modules stay on loadscope:
      #   a = heaviest solver-golden modules;
      #   c = everything else, incl. omnigenity/turbulence/bootstrap/stability.
      # Together they cover the whole non-gradient, non-example core suite once;
      # the separate mirror matrix owns tests/mirror. Therefore
      # every test file appears in exactly one shard (coverage gate combines
      # a+b+c+d), so coverage is invariant under this reshuffle.
      - name: Run parity shard ${{ matrix.shard }} with coverage
        env:
          JAX_ENABLE_X64: "1"
        run: |
          A_FILES="tests/test_parity_breadth.py \
                   tests/test_multigrid_ladder.py \
                   tests/test_optimize_traceable_qs.py \
                   tests/test_freeboundary.py \
                   tests/test_cli_freeboundary.py \
                   tests/test_solver_end_to_end.py"
          B_FILES="tests/test_golden_digests.py \
                   tests/test_bootstrap.py \
                   tests/test_wout_golden.py"
          D_FILES="tests/test_optimize.py"
          if [ "${{ matrix.shard }}" = "a" ]; then
            pytest -q -n 4 --dist loadscope $A_FILES --durations=15 --cov=vmex --cov-report=term
          elif [ "${{ matrix.shard }}" = "b" ]; then
            pytest -q -n 4 --dist load $B_FILES --durations=15 --cov=vmex --cov-report=term
          elif [ "${{ matrix.shard }}" = "d" ]; then
            pytest -q -n 4 --dist load $D_FILES --durations=15 --cov=vmex --cov-report=term
          else
            IGNORES=$(for f in $A_FILES $B_FILES $D_FILES; do echo "--ignore=$f"; done)
            pytest -q -n 4 --dist loadscope tests \
              --ignore=tests/mirror \
              --ignore=tests/test_implicit_grad.py \
              --ignore=tests/test_examples.py \
              $IGNORES \
              --durations=15 --cov=vmex --cov-report=term
          fi

      - name: Stash coverage data
        run: mv .coverage coverage.parity-${{ matrix.shard }}

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-parity-${{ matrix.shard }}
          path: coverage.parity-${{ matrix.shard }}
          retention-days: 3

  gradient:
    name: Implicit-gradient suite ${{ matrix.shard }} (JIT on, coverage)
    runs-on: ubuntu-latest
    # Sharded so no single job exceeds the timeout even on a slow shared runner:
    # shard "a" is the one dominant lasym-adjoint FD test (~3 min), shard "b" is
    # everything else (~4 min). Each shard has its own FD reference cache.
    timeout-minutes: 12
    strategy:
      fail-fast: false
      matrix:
        shard: [a, b]
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install .
          python -m pip install pytest pytest-cov

      - name: Cache finite-difference reference solves
        uses: actions/cache@v4
        with:
          path: /tmp/vmex_implicit_fd_cache.pkl
          # entries are keyed by (case, dof, step, ftol, ns) inside the pickle,
          # so hash the test file: changed FD parameters invalidate the cache.
          # keyed per shard so the two jobs never overwrite each other's cache.
          key: implicit-fd-v2-${{ matrix.shard }}-${{ hashFiles('tests/test_implicit_grad.py') }}

      - name: Run implicit-gradient tests with coverage
        env:
          JAX_ENABLE_X64: "1"
        run: |
          # shard a = the single dominant test; shard b = its complement.
          # -k with a unique test name partitions the suite exactly.
          HEAVY="test_lasym_adjoint_vs_frozen_path_fd"
          if [ "${{ matrix.shard }}" = "a" ]; then SELECT="$HEAVY"; else SELECT="not $HEAVY"; fi
          pytest -q tests/test_implicit_grad.py -k "$SELECT" \
            --durations=0 \
            --cov=vmex --cov-report=term

      - name: Stash coverage data
        run: mv .coverage coverage.gradient-${{ matrix.shard }}

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-gradient-${{ matrix.shard }}
          path: coverage.gradient-${{ matrix.shard }}
          retention-days: 3

  examples:
    name: Example scripts smoke (coverage)
    runs-on: ubuntu-latest
    timeout-minutes: 9
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install .
          python -m pip install pytest pytest-cov

      - name: Run example smokes (QH/QP/QI gated to nightly RUN_FULL)
        env:
          JAX_ENABLE_X64: "1"
        run: |
          pytest -q tests/test_examples.py \
            --durations=10 \
            --cov=vmex --cov-report=term

      - name: Stash coverage data
        run: mv .coverage coverage.examples

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-examples
          path: coverage.examples
          retention-days: 3

  coverage-gate:
    name: Coverage gate (>= 95%)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [parity, gradient, examples]
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install coverage
        run: python -m pip install coverage

      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          merge-multiple: true

      - name: Combine shards and enforce the gate
        run: |
          coverage combine coverage.parity-a coverage.parity-b coverage.parity-c coverage.parity-d coverage.gradient-a coverage.gradient-b coverage.examples
          # The mirror release audit reaches 95% only after appending nightly
          # fixed/free adjoint tests. The fast core artifacts intentionally
          # exclude those tests, so do not mix a partial mirror number into
          # the ordinary core gate.
          coverage report --omit='vmex/mirror/*' --fail-under=95

  cli-smoke:
    name: Console Script Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 9
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install .

      - name: Console script smoke test
        env:
          JAX_ENABLE_X64: "1"
        run: |
          vmec --help
          vmec --version
          rm -rf /tmp/vmex_cli_smoke
          mkdir -p /tmp/vmex_cli_smoke
          cd /tmp
          vmec "$GITHUB_WORKSPACE/examples/data/input.solovev" \
            --quiet \
            --outdir /tmp/vmex_cli_smoke
          test -f /tmp/vmex_cli_smoke/wout_solovev.nc

  build:
    name: Build (wheel/sdist + docs)
    runs-on: ubuntu-latest
    timeout-minutes: 9
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build + docs deps
        run: |
          python -m pip install -U pip
          python -m pip install .
          python -m pip install build sphinx furo

      - name: Build wheel and sdist
        run: |
          python -m build

      - name: Build docs (warnings as errors)
        run: |
          python -m sphinx -W -j auto -b html docs docs/_build/html

  full:
    name: Full-physics suite (nightly / manual only)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    # Includes the compile-heavy optimization-convergence tests (QA precise,
    # QH/QP descent) and the free-boundary end-to-end; nightly wall time is
    # not the <=10-min PR budget, so allow generous headroom.
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install .
          python -m pip install pytest

      - name: Cache golden fixtures
        uses: actions/cache@v4
        with:
          path: ~/.cache/vmex
          key: golden-v1

      # The free-boundary example smokes run the examples as subprocesses,
      # which read examples/data/mgrid_*.nc directly — fetched assets, not
      # git-tracked (repo size budget). Without this step they raise
      # MgridNotFoundError (nightly failure 2026-07-12).
      - name: Fetch reference assets (mgrid files for free-boundary examples)
        run: python tools/fetch_assets.py --bundle reference-nc

      - name: Run the whole suite including full-marked tests
        env:
          JAX_ENABLE_X64: "1"
          RUN_FULL: "1"
        run: |
          pytest -q tests --durations=25

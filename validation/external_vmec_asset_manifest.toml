version = 1
name = "external VMEC validation and benchmark asset candidates"
notes = "Candidate upstream VMEC decks and reference files for optional validation. This manifest intentionally stores URLs and metadata only; do not vendor large or license-unclear files into the repo."

[repositories.simsopt]
name = "hiddenSymmetries/simsopt"
url = "https://github.com/hiddenSymmetries/simsopt"
ref = "1b0cc3a96063197cdbdd01559e04c25456fbe6ff"
default_branch = "master"
license = "MIT"
license_url = "https://github.com/hiddenSymmetries/simsopt/blob/1b0cc3a96063197cdbdd01559e04c25456fbe6ff/LICENSE"
redistribution = "input decks and small references may be bundled if needed with MIT attribution; prefer fetched assets for larger NetCDF references."

[repositories.landreman_vmec_equilibria]
name = "landreman/vmec_equilibria"
url = "https://github.com/landreman/vmec_equilibria"
ref = "41fcf8beb9fb743f0ee6e9c1397981e7ac7b29aa"
default_branch = "master"
license = "none visible in GitHub metadata"
license_url = ""
redistribution = "reference or fetch explicitly for local validation; do not vendor into the repo unless licensing is clarified."

